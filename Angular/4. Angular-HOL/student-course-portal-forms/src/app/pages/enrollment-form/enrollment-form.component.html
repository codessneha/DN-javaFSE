<h2>Student Enrollment Form</h2>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

  <label>Student Name</label><br>

  <input
    type="text"
    name="studentName"
    [(ngModel)]="student.studentName"
    required
    minlength="3"
    #nameCtrl="ngModel">

  <br>

  <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']" style="color:red">
    Name is required
  </span>

  <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']" style="color:red">
    Name must be at least 3 characters
  </span>

  <br><br>

  <label>Email</label><br>

  <input
    type="email"
    name="studentEmail"
    [(ngModel)]="student.studentEmail"
    required
    email
    #emailCtrl="ngModel">

  <br>

  <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']" style="color:red">
    Email is required
  </span>

  <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']" style="color:red">
    Invalid Email
  </span>

  <br><br>

  <label>Course ID</label><br>

  <input
    type="number"
    name="courseId"
    [(ngModel)]="student.courseId"
    required
    #courseCtrl="ngModel">

  <br>

  <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']" style="color:red">
    Course ID is required
  </span>

  <br><br>

  <label>Preferred Semester</label><br>

  <select
    name="preferredSemester"
    [(ngModel)]="student.preferredSemester"
    required
    #semesterCtrl="ngModel">

    <option value="">Select Semester</option>
    <option value="Odd">Odd</option>
    <option value="Even">Even</option>

  </select>

  <br>

  <span *ngIf="semesterCtrl.touched && semesterCtrl.errors?.['required']" style="color:red">
    Select Semester
  </span>

  <br><br>

  <label>
    <input
      type="checkbox"
      name="agreeToTerms"
      [(ngModel)]="student.agreeToTerms"
      required
      #agreeCtrl="ngModel">

    I Agree to Terms & Conditions
  </label>

  <br><br>

 <button
  type="submit"
  [disabled]="enrollForm.invalid">
  Submit
</button>

<button
  type="button"
  (click)="enrollForm.resetForm()">
  Reset
</button>

</form>

<div
  *ngIf="submitted"
  style="color:green; font-weight:bold; margin-top:20px;">
  Enrollment request submitted successfully!
</div>
